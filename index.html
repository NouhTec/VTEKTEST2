<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTEKE ELEKTRONİK MAAŞ HESAPLAMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const bugun = new Date();
            const [veriler, setVeriler] = useState({
                netMaas: 0,
                yolUcreti: 168,
                yemekUcreti: 225,
                ay: bugun.getMonth() + 1,
                yil: bugun.getFullYear(),
                mesaiGunleri: 0,
                mesaiSaatleri: 0,
                devamsizlikGunleri: 0,
                devamsizlikSaatleri: 0,
                resmiTatilGunleri: 0
            });

            const [sonuclar, setSonuclar] = useState(null);

            const getIsGunleri = (yil, ay) => {
                let gunSayisi = 0;
                const aydakiGunler = new Date(yil, ay, 0).getDate();
                for (let i = 1; i <= aydakiGunler; i++) {
                    const tarih = new Date(yil, ay - 1, i);
                    if (tarih.getDay() !== 0 && tarih.getDay() !== 6) {
                        gunSayisi++;
                    }
                }
                return gunSayisi;
            };

            useEffect(() => {
                hesapla();
            }, [veriler]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setVeriler(prev => ({ ...prev, [name]: parseFloat(value) || 0 }));
            };

            const hesapla = () => {
                const {
                    netMaas, yolUcreti, yemekUcreti, ay, yil,
                    mesaiGunleri, mesaiSaatleri, devamsizlikGunleri, devamsizlikSaatleri, resmiTatilGunleri
                } = veriler;

                const gunlukUcret = netMaas / 30;
                const saatlikUcret = gunlukUcret / 9.5;
                const aylikIsGunu = getIsGunleri(yil, ay);
                const fiiliCalismaGunleri = aylikIsGunu - devamsizlikGunleri - resmiTatilGunleri;
                const toplamMesaiSaati = mesaiSaatleri + (mesaiGunleri * 9);
                const mesaiUcreti = toplamMesaiSaati * saatlikUcret * 1.5;
                const sirketteBulunmaGunleri = Math.max(0, fiiliCalismaGunleri + mesaiGunleri);
                const toplamYol = sirketteBulunmaGunleri * yolUcreti;
                const toplamYemek = sirketteBulunmaGunleri * yemekUcreti;
                const kesinti = (devamsizlikGunleri * gunlukUcret) + (devamsizlikSaatleri * saatlikUcret);
                const toplamMaas = netMaas + mesaiUcreti + toplamYol + toplamYemek - kesinti;

                setSonuclar({ gunlukUcret, saatlikUcret, aylikIsGunu, fiiliCalismaGunleri, mesaiUcreti, toplamYol, toplamYemek, kesinti, toplamMaas });
            };

            const pdfIndir = () => {
                const element = document.getElementById('rapor-alani');
                const ayIsmi = new Date(veriler.yil, veriler.ay - 1).toLocaleString('tr-TR', { month: 'long' });
                const opt = {
                    margin: 0.5,
                    filename: `Maas_Raporu_${ayIsmi}_${veriler.yil}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            };

            return (
                <div className="p-4 md:p-8">
                    <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
                        <div className="bg-blue-800 text-white p-6 flex items-center justify-center gap-3">
                            <i className="fa-solid fa-calculator text-2xl"></i>
                            <h1 className="text-xl md:text-2xl font-bold text-center">VTEKE ELEKTRONİK MAAŞ HESAPLAMA SİSTEMİ</h1>
                        </div>
                        <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-4">
                                <h2 className="text-xl font-semibold border-b pb-2 mb-4 text-blue-700">Veri Girişi</h2>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Ay</label>
                                        <select name="ay" value={veriler.ay} onChange={handleChange} className="w-full border rounded p-2 bg-gray-50 outline-none focus:border-blue-500">
                                            {Array.from({length: 12}, (_, i) => i + 1).map(m => (
                                                <option key={m} value={m}>{m}. Ay</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Yıl</label>
                                        <input type="number" name="yil" value={veriler.yil} onChange={handleChange} className="w-full border rounded p-2 bg-gray-50 outline-none focus:border-blue-500" />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium mb-1">Net Maaş (TL)</label>
                                    <input type="number" name="netMaas" onChange={handleChange} className="w-full border border-gray-300 rounded p-2 outline-none focus:border-blue-500" placeholder="Örn: 17002" />
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Günlük Yol (TL)</label>
                                        <input type="number" name="yolUcreti" value={veriler.yolUcreti} onChange={handleChange} className="w-full border rounded p-2 outline-none focus:border-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Günlük Yemek (TL)</label>
                                        <input type="number" name="yemekUcreti" value={veriler.yemekUcreti} onChange={handleChange} className="w-full border rounded p-2 outline-none focus:border-blue-500" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1 text-green-700">Fazla Mesai (Gün)</label>
                                        <input type="number" name="mesaiGunleri" value={veriler.mesaiGunleri || ''} onChange={handleChange} className="w-full border rounded p-2 outline-none focus:border-green-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1 text-green-700">Fazla Mesai (Saat)</label>
                                        <input type="number" name="mesaiSaatleri" value={veriler.mesaiSaatleri || ''} onChange={handleChange} className="w-full border rounded p-2 outline-none focus:border-green-500" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1 text-red-700">Devamsızlık (Gün)</label>
                                        <input type="number" name="devamsizlikGunleri" value={veriler.devamsizlikGunleri || ''} onChange={handleChange} className="w-full border rounded p-2 outline-none focus:border-red-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1 text-red-700">Devamsızlık (Saat)</label>
                                        <input type="number" name="devamsizlikSaatleri" value={veriler.devamsizlikSaatleri || ''} onChange={handleChange} className="w-full border rounded p-2 outline-none focus:border-red-500" />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium mb-1 text-orange-600">Resmi Tatil / İzin (Gün)</label>
                                    <input type="number" name="resmiTatilGunleri" value={veriler.resmiTatilGunleri || ''} onChange={handleChange} className="w-full border rounded p-2 outline-none focus:border-orange-500" />
                                </div>
                            </div>

                            <div className="bg-gray-50 p-4 md:p-6 rounded-lg border border-gray-200">
                                <div id="rapor-alani" className="bg-white p-4 rounded shadow-sm">
                                    <div className="flex items-center gap-2 border-b pb-3 mb-4">
                                        <i className="fa-solid fa-file-invoice-dollar text-blue-600 text-xl"></i>
                                        <h2 className="text-lg font-bold text-gray-800">Maaş Detayı - {veriler.ay}/{veriler.yil}</h2>
                                    </div>
                                    {sonuclar && (
                                        <div className="space-y-3 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Sabit Net Maaş:</span>
                                                <span className="font-medium">{veriler.netMaas.toFixed(2)} TL</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Günlük Ücret:</span>
                                                <span className="font-medium">{sonuclar.gunlukUcret.toFixed(2)} TL</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Saatlik Ücret:</span>
                                                <span className="font-medium">{sonuclar.saatlikUcret.toFixed(2)} TL</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Aydaki İş Günü:</span>
                                                <span className="font-medium">{sonuclar.aylikIsGunu} Gün</span>
                                            </div>
                                            
                                            <hr className="my-2" />
                                            
                                            <div className="flex justify-between text-green-700">
                                                <span>Fazla Mesai Ücreti (+):</span>
                                                <span className="font-medium">{sonuclar.mesaiUcreti.toFixed(2)} TL</span>
                                            </div>
                                            <div className="flex justify-between text-green-700">
                                                <span>Yol Yardımı Toplam (+):</span>
                                                <span className="font-medium">{sonuclar.toplamYol.toFixed(2)} TL</span>
                                            </div>
                                            <div className="flex justify-between text-green-700">
                                                <span>Yemek Yardımı Toplam (+):</span>
                                                <span className="font-medium">{sonuclar.toplamYemek.toFixed(2)} TL</span>
                                            </div>

                                            <hr className="my-2" />

                                            <div className="flex justify-between text-red-600">
                                                <span>Devamsızlık Kesintisi (-):</span>
                                                <span className="font-medium">{sonuclar.kesinti.toFixed(2)} TL</span>
                                            </div>

                                            <div className="mt-6 pt-4 border-t-2 border-gray-800 flex justify-between items-center">
                                                <span className="text-sm md:text-lg font-bold text-gray-800">NET ÖDENECEK:</span>
                                                <span className="text-lg md:text-xl font-bold text-blue-700 bg-blue-50 px-2 py-1 rounded">
                                                    {sonuclar.toplamMaas.toFixed(2)} TL
                                                </span>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <button onClick={pdfIndir} className="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded flex items-center justify-center gap-2 transition-colors">
                                    <i className="fa-solid fa-download"></i> PDF Olarak İndir
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
