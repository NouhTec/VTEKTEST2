<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTEKE ELEKTRONİK - Maaş Bordrosu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6',
                            600: '#2563eb', 800: '#1e40af', 900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans selection:bg-brand-500 selection:text-white pb-10 relative">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const bugun = new Date();
            const aylar = [
                "Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", 
                "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"
            ];

            // تحويل القيم إلى نصوص (Strings) لتجنب أخطاء الإدخال في React
            const [veriler, setVeriler] = useState({
                netMaas: '',
                yolUcreti: '168',
                yemekUcreti: '225',
                ay: (bugun.getMonth() + 1).toString(),
                yil: bugun.getFullYear().toString(),
                mesaiGunleri: '',
                mesaiSaatleri: '',
                devamsizlikGunleri: '',
                devamsizlikSaatleri: '',
                resmiTatilGunleri: ''
            });

            const [sonuclar, setSonuclar] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);

            const getIsGunleri = (yil, ay) => {
                let gunSayisi = 0;
                const aydakiGunler = new Date(yil, ay, 0).getDate();
                for (let i = 1; i <= aydakiGunler; i++) {
                    const tarih = new Date(yil, ay - 1, i);
                    if (tarih.getDay() !== 0 && tarih.getDay() !== 6) {
                        gunSayisi++;
                    }
                }
                return gunSayisi;
            };

            useEffect(() => {
                hesapla();
            }, [veriler]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setVeriler(prev => ({ ...prev, [name]: value }));
            };

            const hesapla = () => {
                // تحويل النصوص إلى أرقام أثناء الحساب فقط لتجنب أي أخطاء
                const netMaas = parseFloat(veriler.netMaas) || 0;
                const yolUcreti = parseFloat(veriler.yolUcreti) || 0;
                const yemekUcreti = parseFloat(veriler.yemekUcreti) || 0;
                const ay = parseInt(veriler.ay) || 1;
                const yil = parseInt(veriler.yil) || 2024;
                const mesaiGunleri = parseFloat(veriler.mesaiGunleri) || 0;
                const mesaiSaatleri = parseFloat(veriler.mesaiSaatleri) || 0;
                const devamsizlikGunleri = parseFloat(veriler.devamsizlikGunleri) || 0;
                const devamsizlikSaatleri = parseFloat(veriler.devamsizlikSaatleri) || 0;
                const resmiTatilGunleri = parseFloat(veriler.resmiTatilGunleri) || 0;

                const gunlukUcret = netMaas / 30;
                const saatlikUcret = gunlukUcret / 9.5;
                const aylikIsGunu = getIsGunleri(yil, ay);
                const fiiliCalismaGunleri = aylikIsGunu - devamsizlikGunleri - resmiTatilGunleri;
                const toplamMesaiSaati = mesaiSaatleri + (mesaiGunleri * 9);
                const mesaiUcreti = toplamMesaiSaati * saatlikUcret * 1.5;
                const sirketteBulunmaGunleri = Math.max(0, fiiliCalismaGunleri + mesaiGunleri);
                const toplamYol = sirketteBulunmaGunleri * yolUcreti;
                const toplamYemek = sirketteBulunmaGunleri * yemekUcreti;
                const kesinti = (devamsizlikGunleri * gunlukUcret) + (devamsizlikSaatleri * saatlikUcret);
                const toplamMaas = netMaas + mesaiUcreti + toplamYol + toplamYemek - kesinti;

                setSonuclar({ gunlukUcret, saatlikUcret, aylikIsGunu, fiiliCalismaGunleri, mesaiUcreti, toplamYol, toplamYemek, kesinti, toplamMaas });
            };

            // وظيفة توليد الصورة وفتح النافذة المنبثقة
            const raporHazirla = async () => {
                setIsGenerating(true);
                const element = document.getElementById('rapor-alani');
                
                try {
                    const canvas = await html2canvas(element, { scale: 3, backgroundColor: '#ffffff' });
                    canvas.toBlob((blob) => {
                        const url = URL.createObjectURL(blob);
                        setPreviewImage({ url, blob });
                        setIsGenerating(false);
                    }, 'image/png');
                } catch (error) {
                    console.error("Hata:", error);
                    alert("Rapor oluşturulurken bir hata oluştu.");
                    setIsGenerating(false);
                }
            };

            // وظيفة التنزيل للابتوب
            const indir = () => {
                const ayIsmi = aylar[parseInt(veriler.ay) - 1];
                const link = document.createElement('a');
                link.download = `VTEKE_Bordro_${ayIsmi}_${veriler.yil}.png`;
                link.href = previewImage.url;
                link.click();
            };

            // وظيفة المشاركة السريعة للآيفون والموبايل
            const paylas = async () => {
                const ayIsmi = aylar[parseInt(veriler.ay) - 1];
                const file = new File([previewImage.blob], `VTEKE_Bordro_${ayIsmi}_${veriler.yil}.png`, { type: 'image/png' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Maaş Bordrosu',
                            text: `VTEKE ELEKTRONİK - ${ayIsmi} ${veriler.yil} Maaş Detayı`
                        });
                    } catch (error) {
                        console.log('Paylaşım iptal edildi', error);
                    }
                } else {
                    alert("Cihazınız doğrudan paylaşımı desteklemiyor. Lütfen indir butonunu kullanın.");
                }
            };

            const InputField = ({ label, name, type="number", icon, value, placeholder, color="brand" }) => (
                <div>
                    <label className={`block text-xs font-semibold uppercase tracking-wider mb-1.5 text-${color}-700`}>{label}</label>
                    <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i className={`fa-solid ${icon} text-slate-400`}></i>
                        </div>
                        <input 
                            type={type} name={name} value={value} onChange={handleChange} placeholder={placeholder}
                            className={`w-full pl-10 pr-3 py-2.5 bg-white border border-slate-200 rounded-lg text-sm shadow-sm placeholder-slate-400
                            focus:outline-none focus:border-${color}-500 focus:ring-1 focus:ring-${color}-500 transition-all`}
                        />
                    </div>
                </div>
            );

            return (
                <div className="pt-4 md:pt-10 px-4">
                    
                    {/* النافذة المنبثقة للمعاينة والمشاركة (تظهر فقط عند جاهزية الصورة) */}
                    {previewImage && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-5 w-full max-w-md shadow-2xl relative flex flex-col items-center animate-fade-in-up">
                                <button onClick={() => setPreviewImage(null)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                                
                                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-circle-check text-emerald-500"></i> Bordro Hazır!
                                </h3>
                                
                                <div className="w-full bg-slate-100 rounded-xl p-2 mb-5 max-h-[50vh] overflow-auto border border-slate-200 shadow-inner">
                                    <img src={previewImage.url} alt="Bordro Preview" className="w-full h-auto object-contain rounded" />
                                </div>
                                
                                <div className="flex gap-3 w-full">
                                    <button onClick={indir} className="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                        <i className="fa-solid fa-download"></i> İndir
                                    </button>
                                    {/* زر المشاركة يظهر فقط إذا كان الجهاز يدعمه (مثل الآيفون) */}
                                    {navigator.canShare && (
                                        <button onClick={paylas} className="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                            <i className="fa-solid fa-share-nodes"></i> Paylaş
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="max-w-6xl mx-auto">
                        
                        {/* Header Section */}
                        <div className="bg-gradient-to-r from-brand-900 to-brand-600 rounded-t-2xl p-6 md:p-8 shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 right-0 -mt-4 -mr-4 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
                            <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-4">
                                <div className="flex items-center gap-4 text-white">
                                    <div className="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm border border-white/30">
                                        <i className="fa-solid fa-microchip text-3xl"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-2xl md:text-3xl font-bold tracking-tight">VTEKE ELEKTRONİK</h1>
                                        <p className="text-brand-100 font-medium tracking-wide">Akıllı Maaş Hesaplama Sistemi</p>
                                    </div>
                                </div>
                                <div className="bg-white/10 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/20 text-white text-sm font-medium">
                                    <i className="fa-regular fa-calendar-check mr-2"></i>
                                    {aylar[parseInt(veriler.ay) - 1]} {veriler.yil} Dönemi
                                </div>
                            </div>
                        </div>

                        {/* Main Content Grid */}
                        <div className="bg-white shadow-xl rounded-b-2xl flex flex-col lg:flex-row border border-slate-100">
                            
                            {/* Left Column: Form Inputs */}
                            <div className="w-full lg:w-7/12 p-6 md:p-8 lg:border-r border-slate-100">
                                <h2 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-pen-to-square text-brand-500"></i> Veri Giriş Paneli
                                </h2>
                                
                                <div className="space-y-6">
                                    {/* Section 1: Basic Info */}
                                    <div className="bg-slate-50 p-5 rounded-xl border border-slate-100 shadow-sm">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                            <div>
                                                <label className="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-slate-700">Dönem (Ay)</label>
                                                <div className="relative">
                                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                        <i className="fa-solid fa-calendar text-slate-400"></i>
                                                    </div>
                                                    <select name="ay" value={veriler.ay} onChange={handleChange} 
                                                        className="w-full pl-10 pr-3 py-2.5 bg-white border border-slate-200 rounded-lg text-sm shadow-sm focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 appearance-none">
                                                        {aylar.map((ayIsmi, index) => <option key={index + 1} value={index + 1}>{ayIsmi}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <InputField label="Yıl" name="yil" icon="fa-calendar-days" value={veriler.yil} />
                                            {/* تم إصلاح حقل الراتب هنا */}
                                            <InputField label="Net Maaş (TL)" name="netMaas" icon="fa-turkish-lira-sign" placeholder="Örn: 17002" color="brand" value={veriler.netMaas} />
                                        </div>
                                    </div>

                                    {/* Section 2: Allowances */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div className="bg-blue-50/50 p-5 rounded-xl border border-blue-100 shadow-sm">
                                            <InputField label="Günlük Yol Ücreti (TL)" name="yolUcreti" icon="fa-bus" value={veriler.yolUcreti} color="blue" />
                                        </div>
                                        <div className="bg-orange-50/50 p-5 rounded-xl border border-orange-100 shadow-sm">
                                            <InputField label="Günlük Yemek Ücreti (TL)" name="yemekUcreti" icon="fa-utensils" value={veriler.yemekUcreti} color="orange" />
                                        </div>
                                    </div>

                                    {/* Section 3: Overtime & Deductions */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        {/* Overtime (Green) */}
                                        <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-100 shadow-sm space-y-4">
                                            <h3 className="text-sm font-bold text-emerald-800 border-b border-emerald-200 pb-2 flex items-center gap-2">
                                                <i className="fa-solid fa-arrow-trend-up"></i> Fazla Mesai (Ek Kazanç)
                                            </h3>
                                            <div className="grid grid-cols-2 gap-3">
                                                <InputField label="Gün Olarak" name="mesaiGunleri" icon="fa-sun" value={veriler.mesaiGunleri} placeholder="0" color="emerald" />
                                                <InputField label="Saat Olarak" name="mesaiSaatleri" icon="fa-clock" value={veriler.mesaiSaatleri} placeholder="0" color="emerald" />
                                            </div>
                                        </div>

                                        {/* Deductions (Red) */}
                                        <div className="bg-rose-50 p-5 rounded-xl border border-rose-100 shadow-sm space-y-4">
                                            <h3 className="text-sm font-bold text-rose-800 border-b border-rose-200 pb-2 flex items-center gap-2">
                                                <i className="fa-solid fa-arrow-trend-down"></i> Devamsızlık (Kesinti)
                                            </h3>
                                            <div className="grid grid-cols-2 gap-3">
                                                <InputField label="Gün Olarak" name="devamsizlikGunleri" icon="fa-calendar-xmark" value={veriler.devamsizlikGunleri} placeholder="0" color="rose" />
                                                <InputField label="Saat Olarak" name="devamsizlikSaatleri" icon="fa-user-clock" value={veriler.devamsizlikSaatleri} placeholder="0" color="rose" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Official Holidays */}
                                    <div className="bg-purple-50 p-5 rounded-xl border border-purple-100 shadow-sm">
                                        <InputField label="Resmi Tatil / Ücretli İzin (Gün)" name="resmiTatilGunleri" icon="fa-umbrella-beach" value={veriler.resmiTatilGunleri} placeholder="0" color="purple" />
                                    </div>
                                </div>
                            </div>

                            {/* Right Column: Payslip Result */}
                            <div className="w-full lg:w-5/12 bg-slate-50 p-6 md:p-8 flex flex-col justify-between">
                                
                                <div id="rapor-alani" className="bg-white p-6 rounded-xl shadow-md border border-slate-200 relative overflow-hidden">
                                    <i className="fa-solid fa-microchip absolute -right-10 -bottom-10 text-9xl text-slate-50 opacity-50 pointer-events-none transform -rotate-12"></i>
                                    
                                    <div className="text-center border-b-2 border-slate-800 pb-4 mb-5 relative z-10">
                                        <h2 className="text-xl font-black text-slate-800 tracking-wider">MAAŞ BORDROSU</h2>
                                        <p className="text-sm text-slate-500 font-medium mt-1">{aylar[parseInt(veriler.ay) - 1]} {veriler.yil} Dönemi</p>
                                    </div>

                                    {sonuclar && (
                                        <div className="space-y-4 text-sm relative z-10">
                                            <div className="bg-slate-50 p-3 rounded-lg border border-slate-100">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-slate-600 font-medium">Sabit Net Maaş:</span>
                                                    <span className="font-bold text-slate-800">{(parseFloat(veriler.netMaas) || 0).toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺</span>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 text-xs text-slate-500 mt-2 border-t border-slate-200 pt-2">
                                                    <div className="flex justify-between"><span>Günlük:</span> <span className="font-semibold">{sonuclar.gunlukUcret.toFixed(2)} ₺</span></div>
                                                    <div className="flex justify-between"><span>Saatlik:</span> <span className="font-semibold">{sonuclar.saatlikUcret.toFixed(2)} ₺</span></div>
                                                    <div className="flex justify-between col-span-2"><span>Aydaki İş Günü (Hafta sonu hariç):</span> <span className="font-semibold">{sonuclar.aylikIsGunu} Gün</span></div>
                                                </div>
                                            </div>
                                            
                                            <div className="space-y-2">
                                                <div className="flex justify-between text-emerald-700 font-medium">
                                                    <span className="flex items-center gap-2"><i className="fa-solid fa-plus text-xs"></i> Fazla Mesai Ücreti</span>
                                                    <span>{sonuclar.mesaiUcreti.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺</span>
                                                </div>
                                                <div className="flex justify-between text-emerald-700 font-medium">
                                                    <span className="flex items-center gap-2"><i className="fa-solid fa-plus text-xs"></i> Yol Yardımı</span>
                                                    <span>{sonuclar.toplamYol.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺</span>
                                                </div>
                                                <div className="flex justify-between text-emerald-700 font-medium">
                                                    <span className="flex items-center gap-2"><i className="fa-solid fa-plus text-xs"></i> Yemek Yardımı</span>
                                                    <span>{sonuclar.toplamYemek.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺</span>
                                                </div>
                                            </div>

                                            <div className="pt-2 border-t border-dashed border-slate-300">
                                                <div className="flex justify-between text-rose-600 font-medium">
                                                    <span className="flex items-center gap-2"><i className="fa-solid fa-minus text-xs"></i> Devamsızlık Kesintisi</span>
                                                    <span>{sonuclar.kesinti.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺</span>
                                                </div>
                                            </div>

                                            <div className="mt-6 pt-4 border-t-2 border-slate-800 flex justify-between items-center bg-brand-50 p-3 rounded-lg border-l-4 border-l-brand-600">
                                                <span className="text-sm font-bold text-brand-900 uppercase tracking-wide">Net Ödenecek:</span>
                                                <span className="text-xl font-black text-brand-700">
                                                    {sonuclar.toplamMaas.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺
                                                </span>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <button 
                                    onClick={raporHazirla} 
                                    disabled={isGenerating}
                                    className={`w-full mt-6 text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-3 transition-all transform shadow-lg hover:shadow-xl group ${isGenerating ? 'bg-slate-400 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-900 hover:-translate-y-0.5'}`}>
                                    {isGenerating ? (
                                        <><i className="fa-solid fa-spinner fa-spin"></i> Hazırlanıyor...</>
                                    ) : (
                                        <><i className="fa-solid fa-image"></i> Bordroyu Hazırla</>
                                    )}
                                </button>
                                <p className="text-center text-xs text-slate-400 mt-3 font-medium">
                                    <i className="fa-solid fa-shield-halved mr-1"></i> Verileriniz sadece cihazınızda hesaplanır.
                                </p>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
